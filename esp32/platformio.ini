; Default: USB only. OTA: pio run -e ota -t upload --upload-port <ip>
[platformio]
default_envs = seeed_xiao_esp32s3

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
build_flags =
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DBOARD_HAS_PSRAM
lib_deps =
	links2004/WebSockets@^2.6.1
	madhephaestus/ESP32Servo@^3.0.6
	bblanchon/ArduinoJson@^7.3.0
	espressif/esp32-camera@^2.0.4

; WiFi OTA — car must already be on WiFi with this firmware once
;   pio run -e ota -t upload --upload-port 192.168.x.x
;   or:  pio run -e ota -t upload --upload-port rc-car.local
[env:ota]
extends = env:seeed_xiao_esp32s3
upload_protocol = espota
upload_flags =
	--auth=rc-car-ota
	--port=3232
